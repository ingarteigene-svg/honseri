name: Deploy til GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: gjodselapp/package-lock.json
      - run: npm ci
        working-directory: gjodselapp
      - run: npm run build
        working-directory: gjodselapp
        env:
          NEXT_PUBLIC_BASE_PATH: /honseri/gjodsel
      - name: Sett sammen nettstedet (egg på rot, gjødsel under /gjodsel)
        run: |
          mkdir -p site/gjodsel
          cp -r eggapp/. site/
          cp -r gjodselapp/out/. site/gjodsel/
      - name: Verifiser nettstedet før publisering
        run: |
          set -e
          for f in index.html sw.js manifest.webmanifest icons/icon-192.png \
                   gjodsel/index.html gjodsel/sw.js gjodsel/manifest.json \
                   gjodsel/logg/index.html gjodsel/skifter/index.html \
                   gjodsel/innstillinger/index.html; do
            test -f "site/$f" || { echo "MANGLER: site/$f"; exit 1; }
          done
          grep -q 'honseri-v' site/sw.js
          grep -q 'gjodsel-shell-v' site/gjodsel/sw.js
          echo "Alle nøkkelfiler på plass ✓"
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
